name: Component Release

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version to release (e.g. 1.2.3)'
        required: true
        type: string

jobs:
  release:
    uses: rdkcentral/build_tools_workflows/.github/workflows/component-release-main.yml@feature/RDKEMW-18857
    with:
      tag: ${{ inputs.tag }}
    secrets:
      RDKCM_DEPLOY_KEY: ${{ secrets.RDKCM_DEPLOY_KEY }}
